name: Refresh README resources

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh generated resources
        run: python scripts/update_readme.py
      - name: Commit refreshed README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh RAG medical resources"
          file_pattern: README.md
